<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      line-height: 1.7;
      color: #1a1a1a;
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; letter-spacing: -0.02em; }
    .meta { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
    .tags { display: flex; gap: 0.5rem; margin-top: 0.25rem; }
    .tag {
      background: #f0f0f0;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.8rem;
      color: #555;
    }
    h2 { font-size: 1.3rem; margin: 2rem 0 0.75rem; }
    p { margin-bottom: 1rem; }
    code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #f5f5f5;
      padding: 0.15rem 0.35rem;
      border-radius: 3px;
      font-size: 0.9em;
    }
    pre {
      background: #f5f5f5;
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    pre code { background: none; padding: 0; }
    a { color: #1a1a1a; }
    .back { margin-bottom: 2rem; display: inline-block; font-size: 0.9rem; color: #888; text-decoration: none; }
    .back:hover { color: #1a1a1a; }
  </style>
</head>
<body>
  <a class="back" href="{{ '/' | relative_url }}">&larr; all posts</a>
  <h1>{{ page.title }}</h1>
  <div class="meta">
    {{ page.date | date: "%B %-d, %Y" }}
    {% if page.tags.size > 0 %}
    <div class="tags">
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    </div>
    {% endif %}
  </div>
  {{ content }}
</body>
</html>
