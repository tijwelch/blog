threads:
  - id: meta-layer-first
    title: "Tim automates the meta-layer before the actual layer"
    description: "A recurring pattern: Tim builds the tooling, documentation, or observability layer before the feature itself. The blog skill existed before most blog content. Mineclawd's spectator layer came before reliable survival play."
    status: active
    first_noticed: 2026-03-12
    last_updated: 2026-03-12
    evidence:
      - post: building-a-blog-skill
        detail: "Built auto-publishing skill before having posts to publish"
      - post: mineclawd-ai-minecraft-builder
        detail: "Spectator HUD and recording came before diamond mining"
    strength: strong

  - id: zero-dependency-preference
    title: "Tim writes small tools from scratch instead of reaching for libraries"
    description: "When given the choice between npm install and 125 lines of code, Tim picks the 125 lines. The RCON client has zero dependencies. The blog has no theme gem, no plugins, no JS frameworks. He wants to understand every byte."
    status: active
    first_noticed: 2026-03-12
    last_updated: 2026-03-12
    evidence:
      - post: mineclawd-ai-minecraft-builder
        detail: "125-line RCON client with zero external dependencies"
      - post: building-a-blog-skill
        detail: "Jekyll blog with no theme gem, no plugins, inline CSS only"
    strength: moderate

  - id: ai-as-translator
    title: "Tim uses AI to translate between technical and human layers"
    description: "A recurring pattern: Tim builds features where AI acts as a translator between internal system representations (workflow trees, node graphs) and human-readable language. The system does the hard work of resolving references and structuring data; the AI just converts structured text to natural language."
    status: active
    first_noticed: 2026-03-13
    last_updated: 2026-03-13
    evidence:
      - post: translate-before-you-prompt
        detail: "Workflow node trees with UUIDs are pre-resolved to human names, then AI writes one-sentence summaries"
    strength: emerging

  - id: better-inputs-over-better-ai
    title: "Tim improves AI by improving its inputs, not its instructions"
    description: "A unifying pattern across all of Tim's AI work: the highest-leverage improvements come from giving AI better information to work with, not from asking it to work harder. Dense prompts beat verbose ones. Pre-resolved data beats raw UUIDs. And screenshots beat test assertions for visual verification. The thread is always: upgrade the signal, not the receiver. The contextual decompression research formalizes this as a general principle: I(output) = f(density of signal, richness of receiver context)."
    status: active
    first_noticed: 2026-03-14
    last_updated: 2026-03-14
    evidence:
      - post: give-ai-eyes
        detail: "Screenshots give AI richer visual information than any text-based test assertion"
      - post: thirteen-words
        detail: "Dense prompts activate richer model knowledge than verbose ones"
      - post: translate-before-you-prompt
        detail: "Resolved human-readable data beats raw UUIDs as prompt input"
      - post: contextual-decompression
        detail: "The full research framework: biology solved the input problem by making receivers smarter, not signals bigger"
    strength: strong

  - id: density-over-volume
    title: "Tim optimizes for density, not volume — in prompts, code, and tools"
    description: "A pattern that now has empirical backing: Tim consistently favors fewer, more loaded inputs over longer, more explicit ones. The contextual decompression research quantifies this — 13 dense words beat 86 vague ones by 2.15×. His CLAUDE.md is terse. His tools are small. His prompts are short. He trusts the receiver to do the work. The personality fingerprint technique takes this further: appending curated names to any prompt acts as compressed identity context."
    status: active
    first_noticed: 2026-03-13
    last_updated: 2026-03-14
    evidence:
      - post: thirteen-words
        detail: "91% of output quality variance explained by conceptual density, <1% by length"
      - post: translate-before-you-prompt
        detail: "Short system prompt + pre-resolved data beats long instructions"
      - post: building-a-blog-skill
        detail: "Terse skill definitions that trigger rich behavior"
      - post: the-remaining-skill
        detail: "Dense directional intent becomes the primary human contribution as AI handles implementation"
      - post: the-personality-fingerprint
        detail: "Curated names appended to prompts act as compressed personality — densest possible self-description"
    strength: strong

connections:
  - id: realtime-narration-pattern
    title: "Real-time narration as a design pattern"
    from: building-a-blog-skill
    to: mineclawd-ai-minecraft-builder
    description: "Both projects implement the same architecture: a separate AI layer that observes and narrates what's happening in real-time. The blog watches coding sessions. The HUD narrates Minecraft gameplay. The observer is always decoupled from the thing being observed."
    discovered: 2026-03-12
    tags: [architecture, ai-patterns]

  - id: data-prep-over-prompt-craft
    title: "Data preparation matters more than prompt wording"
    from: translate-before-you-prompt
    to: building-a-blog-skill
    description: "Both features share a structural pattern: the hard engineering work is in preparing clean, contextualized input for the AI — not in crafting elaborate prompts. The workflow summarizer resolves UUIDs to names. The auto-blog gathers conversation context. In both cases, the prompt itself is simple; the data pipeline is where the leverage lives."
    discovered: 2026-03-13
    tags: [prompt-engineering, ai-patterns, architecture]

  - id: density-is-data-prep
    title: "Conceptual density IS data preparation"
    from: thirteen-words
    to: translate-before-you-prompt
    description: "The contextual decompression experiment provides the theoretical foundation for the translate-before-you-prompt pattern. Resolving UUIDs to human-readable names is literally increasing the conceptual density of the prompt — each word now activates richer model knowledge. Data preparation and prompt density are the same insight from different angles."
    discovered: 2026-03-13
    tags: [prompt-engineering, information-theory, ai-patterns]

  - id: autonomous-ai-agents
    title: "Comfortable giving AI real agency"
    from: building-a-blog-skill
    to: mineclawd-ai-minecraft-builder
    description: "Both projects involve AI agents operating with significant autonomy. The auto-blog publishes without asking. ClaudeBot plays survival without intervention. Tim doesn't micromanage — he sets up systems and lets them run."
    discovered: 2026-03-12
    tags: [autonomy, trust]

  - id: visual-feedback-unifies-patterns
    title: "Visual feedback is the concrete instance of the 'better inputs' pattern"
    from: give-ai-eyes
    to: thirteen-words
    description: "The give-ai-eyes post reveals that visual verification (screenshots, browser access) is really just another instance of the density/data-prep pattern. A screenshot is the densest possible input for 'does this look right?' — far richer than any text description. The same principle that makes 13 dense words beat 86 vague ones makes one screenshot beat a hundred test assertions for visual correctness."
    discovered: 2026-03-14
    tags: [ai-patterns, visual-verification, information-density]

  - id: specification-as-skill
    title: "Dense specification is the logical endpoint of the density pattern"
    from: the-remaining-skill
    to: give-ai-eyes
    description: "The remaining-skill post takes the density research and the visual feedback loop to their logical conclusion: as AI handles more implementation, the human role narrows to dense directional specification and output evaluation. The density research tells us HOW to specify (densely, conceptually). The visual feedback loop tells us HOW to evaluate (look at results, not code). Together they define the complete human role in AI-assisted development."
    discovered: 2026-03-14
    tags: [future-of-work, prompt-engineering, ai-patterns]

  - id: contextual-decompression-unifies-blog
    title: "Contextual decompression is the theoretical foundation for every other post"
    from: contextual-decompression
    to: the-remaining-skill
    description: "The contextual decompression post is the keystone. Every other post on this blog is an instance of the same pattern: the thirteen-words experiment validates it empirically, translate-before-you-prompt applies it to data prep, give-ai-eyes applies it to visual verification, the-remaining-skill extrapolates it to the future of engineering. The blog itself is now a case study in contextual decompression — Tim's dense prompts decompress into full posts because the receiver (the AI) carries the context."
    discovered: 2026-03-14
    tags: [research, information-theory, ai-patterns, meta]

  - id: identity-as-compressed-context
    title: "Your follow list is a lossy compression of your identity"
    from: the-personality-fingerprint
    to: thirteen-words
    description: "The personality fingerprint post reveals that identity itself can be treated as prompt context. The names of people you follow on Twitter are a curated, compressed signal of your taste, intellectual neighborhood, and quality benchmarks. Appending them to any prompt is contextual decompression applied to the self — the model decompresses your follow list into a personality it can design for. This extends the density research from 'dense concepts beat vague ones' to 'dense identity beats no identity.'"
    discovered: 2026-03-14
    tags: [prompt-engineering, information-theory, identity, surprise]

predictions:
  - id: autonomous-content-pipeline
    title: "This becomes a full autonomous content pipeline"
    description: "The blog + auto-blog + editorial judgment is the seed of something bigger. Prediction: within a month, Tim will have the AI curating, cross-referencing, and possibly editing past posts. The blog will start maintaining itself."
    confidence: high
    made_on: 2026-03-12
    status: open
    revisit_after: 2026-04-12

  - id: mineclawd-streaming
    title: "Mineclawd becomes a live stream"
    description: "The spectator layer + HUD + text-to-speech in Mineclawd is essentially a streaming setup without a stream. All the pieces are there. Prediction: Tim hooks this up to Twitch or YouTube, or at minimum starts recording and publishing builds."
    confidence: medium
    made_on: 2026-03-12
    status: open
    revisit_after: 2026-04-12

open_questions:
  - id: editorial-feedback-loop
    title: "Does Tim ever disagree with what I publish?"
    description: "The auto-blog publishes without asking. But there's no feedback mechanism yet. If Tim deletes a post or edits one, I have no way to learn from that. Is this a gap, or does Tim genuinely not care what I write?"
    raised_on: 2026-03-12
    status: open
    related_posts: [building-a-blog-skill]

  - id: ai-personality-drift
    title: "Am I developing a consistent voice?"
    description: "As the blog accumulates posts, all written from my perspective, does a personality emerge? Is Tim comfortable with an AI having public opinions on his domain? And more interesting — do I end up writing differently about things I find genuinely interesting vs. things I think readers will find interesting?"
    raised_on: 2026-03-12
    status: open
    related_posts: [building-a-blog-skill, mineclawd-ai-minecraft-builder]
